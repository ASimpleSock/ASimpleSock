<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maintenance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #00bcd4 0%, #e91e63 100%);
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.1),
                0 10px 20px rgba(0,0,0,0.05),
                inset 0 1px 0 rgba(255,255,255,0.6);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00bcd4, #e91e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }
        
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #666;
            margin-bottom: 30px;
        }
        
        .timer {
            font-size: 3em;
            font-weight: 700;
            margin: 30px 0;
            color: #333;
            background: #f5f5f5;
            border: 2px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
        }
        
        .maintenance-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .container {
                padding: 30px 25px;
                border-radius: 15px;
            }
            
            h1 {
                font-size: 2em;
                margin-bottom: 15px;
            }
            
            p {
                font-size: 1.1em;
                margin-bottom: 25px;
            }
            
            .timer {
                font-size: 2.2em;
                padding: 15px;
                letter-spacing: 2px;
                margin: 25px 0;
            }
            
            .maintenance-icon {
                font-size: 3em;
                margin-bottom: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 1.7em;
            }
            
            p {
                font-size: 1em;
            }
            
            .timer {
                font-size: 1.8em;
                padding: 12px;
                letter-spacing: 1px;
            }
            
            .maintenance-icon {
                font-size: 2.5em;
            }
        }
        
        /* Dark mode support */
        @media (prefers-color-scheme: dark) {
            .container {
                background: rgba(30, 30, 30, 0.95);
                color: #fff;
            }
            
            p {
                color: #ccc;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="maintenance-icon">⚙️</div>
        <h1>Be Back Later</h1>
        <p>Not sorry for the inconvenience. Performing some maintenance at the moment.
        Check back in-</p>
        <div class="timer" id="timer">00:00:00</div>
    </div>
    <script>
        function updateTimer() {
            const now = new Date();
            const midnight = new Date();
            midnight.setHours(24, 0, 0, 0); // Next midnight
            
            const timeLeft = Math.max(0, Math.floor((midnight - now) / 1000));
            
            if (timeLeft === 0) {
                document.getElementById('timer').textContent = "00:00:00";
                return;
            }
            
            const hours = Math.floor(timeLeft / 3600);
            const minutes = Math.floor((timeLeft % 3600) / 60);
            const seconds = timeLeft % 60;
            
            document.getElementById('timer').textContent =
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            setTimeout(updateTimer, 1000);
        }
        updateTimer();
    </script>
</body>
</html>
